<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RHUTHVIK BANTU</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Navbar -->
<header class="topbar">
  <div class="logo">RHUTHVIK BANTU</div>
  <input type="text" placeholder="Search..." class="search">
  <div class="top-icons">
    <i class="fas fa-home"></i>
    <i class="fas fa-film"></i>
    <i class="fas fa-paper-plane"></i>
    <i class="fas fa-user-circle"></i>
  </div>
</header>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <ul>
      <li><i class="fas fa-home"></i> Home</li>
      <li><i class="fas fa-search"></i> Search</li>
      <li><i class="fas fa-film"></i> Reels</li>
      <li><i class="fas fa-envelope"></i> Messages</li>
      <li><i class="fas fa-user"></i> Profile</li>
    </ul>
  </aside>

  <!-- Main Feed -->
  <main class="feed">

    <div class="post">
      <div class="post-header">
        <img src="https://i.pravatar.cc/40" class="profile-img">
        <span>hruthvik_official</span>
      </div>
      <img src="https://picsum.photos/500/500" class="post-img">
      <div class="post-icons">
        <i class="far fa-heart"></i>
        <i class="far fa-comment"></i>
        <i class="far fa-paper-plane"></i>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <img src="https://i.pravatar.cc/41" class="profile-img">
        <span>rcb_fan_page</span>
      </div>
      <img src="https://picsum.photos/500/600" class="post-img">
      <div class="post-icons">
        <i class="far fa-heart"></i>
        <i class="far fa-comment"></i>
        <i class="far fa-paper-plane"></i>
      </div>
    </div>

  </main>

</div>

<!-- Reels Section -->
<section class="reels-section">
  <video src="https://www.w3schools.com/html/mov_bbb.mp4" class="reel" muted loop></video>
  <video src="https://www.w3schools.com/html/movie.mp4" class="reel" muted loop></video>
</section>

<!-- Messages UI -->
<section class="messages-section">
  <div class="chat-list">
    <div class="chat">RCB Fans</div>
    <div class="chat">Yash Edits</div>
    <div class="chat">Cricket Updates</div>
  </div>
  <div class="chat-window">
    <div class="message received">Hey bro 🔥</div>
    <div class="message sent">What's up!</div>
  </div>
</section>

<script src="script.js"></script>
</body>
  </html>
